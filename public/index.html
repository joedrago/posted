<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>posted</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <header>
            <h1>posted</h1>
            <nav id="breadcrumb" class="breadcrumb"></nav>
            <label class="filter">
                <input type="checkbox" id="missing-only" />
                Only missing
            </label>
            <label class="filter">
                <input type="checkbox" id="hide-dirs" />
                Hide directories
            </label>
            <button id="bulk-btn" title="Set posters for all visible missing/inherited items">Bulk Fix</button>
            <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
        </header>

        <main id="grid" class="grid"></main>

        <div id="status" class="status"></div>

        <div id="modal" class="modal hidden">
            <div class="modal-box">
                <button class="modal-close" id="modal-close" title="Close">×</button>
                <div class="modal-head">
                    <div class="modal-current">
                        <div class="poster" id="modal-current-poster"></div>
                    </div>
                    <div class="modal-controls">
                        <h2 id="modal-title">Choose a poster</h2>
                        <div class="modal-target" id="modal-target"></div>
                        <div class="path-segments" id="path-segments"></div>
                        <div class="search-row">
                            <div class="type-toggle" id="type-toggle">
                                <button data-type="movie">Movie</button>
                                <button data-type="tv">TV</button>
                            </div>
                            <input type="text" id="search-title" placeholder="Title" />
                            <input type="number" id="search-season" placeholder="Season" min="0" class="season-input" />
                            <button id="search-go">Search</button>
                            <button id="upload-btn" title="Use your own image">Upload…</button>
                            <input type="file" id="upload-input" accept="image/jpeg,image/png,image/webp" hidden />
                        </div>
                    </div>
                </div>
                <div class="candidates" id="candidates"></div>
            </div>
        </div>

        <div id="settings-modal" class="modal hidden">
            <div class="modal-box settings-box">
                <button class="modal-close" id="settings-close" title="Close">×</button>
                <h2>Settings</h2>
                <label class="field">
                    TMDB API key <span class="state" id="state-tmdb"></span>
                    <input type="password" id="set-tmdb" placeholder="enter to set / change" />
                </label>
                <label class="field">
                    fanart.tv API key <span class="state" id="state-fanart"></span>
                    <input type="password" id="set-fanart" placeholder="enter to set / change" />
                </label>
                <div class="settings-actions">
                    <button id="set-save">Save</button>
                    <span id="set-status" class="muted"></span>
                </div>
                <p class="hint">Environment variables (TMDB_API_KEY, FANART_API_KEY) override saved keys on restart.</p>
            </div>
        </div>

        <div id="bulk-modal" class="modal hidden">
            <div class="modal-box bulk-box">
                <h2>Bulk Fix</h2>
                <div id="bulk-text" class="bulk-text"></div>
                <div class="bulk-bar"><div id="bulk-fill" class="bulk-fill"></div></div>
                <div class="bulk-actions">
                    <button id="bulk-close" hidden>Close</button>
                </div>
            </div>
        </div>

        <script type="module" src="/app.js"></script>
    </body>
</html>
